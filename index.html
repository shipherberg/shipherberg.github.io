<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Parabitex | پارابیتکس</title>
    
    <!-- کتابخانه تلگرام -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <!-- لینک معتبرتر برای فونت زیبای وزیرمتن -->
    <link href="https://cdn.jsdelivr.net/npm/vazirmatn@33.0.0/Vazirmatn-font-face.css" rel="stylesheet" type="text/css" />
    
    <!-- آیکون‌های FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            /* در این طراحی، یک تم تیره شیک و مدرن را پایه قرار دادیم که برای صرافی‌ها جذاب‌تر است */
            --bg-color: var(--tg-theme-bg-color, #0b0f19);
            --text-color: var(--tg-theme-text-color, #ffffff);
            --hint-color: var(--tg-theme-hint-color, #94a3b8);
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.05);
            --buy-color: #10b981; 
            --sell-color: #ef4444;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Vazirmatn', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            padding: 20px;
            padding-bottom: 80px;
            position: relative;
            overflow-x: hidden; /* برای جلوگیری از اسکرول افقی بخاطر افکت‌های نوری */
        }

        /* افکت‌های نوری پس‌زمینه (زرق و برق مدرن) */
        .glow-circle-1 {
            position: absolute;
            top: -50px; left: -50px;
            width: 250px; height: 250px;
            background: rgba(16, 185, 129, 0.15); /* هاله سبز */
            filter: blur(80px);
            z-index: -1;
        }
        
        .glow-circle-2 {
            position: absolute;
            top: 30%; right: -80px;
            width: 300px; height: 300px;
            background: rgba(59, 130, 246, 0.15); /* هاله آبی */
            filter: blur(100px);
            z-index: -1;
        }

        /* هدر صرافی پارابیتکس */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 35px;
        }

        .brand-container {
            display: flex;
            flex-direction: column;
        }

        .brand-en {
            font-size: 1.6rem;
            font-weight: 900;
            letter-spacing: 1.5px;
            background: linear-gradient(90deg, #10b981, #3b82f6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
            line-height: 1.2;
        }

        .brand-fa {
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--hint-color);
            letter-spacing: 2px;
        }

        .user-status {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(10px);
            padding: 6px 14px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.85rem;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .user-status i {
            color: #f59e0b; /* رنگ طلایی برای نشان کاربر */
        }

        /* کارت موجودی با افکت شیشه‌ای و انیمیشن درخشش */
        .balance-card {
            background: linear-gradient(145deg, rgba(255,255,255,0.05) 0%, rgba(255,255,255,0.01) 100%);
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(16px);
            border-radius: 24px;
            padding: 35px 20px;
            text-align: center;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            position: relative;
            overflow: hidden;
        }

        /* خط نوری متحرک روی کارت */
        .balance-card::before {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 50%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.08), transparent);
            transform: skewX(-25deg);
            animation: shine 4s infinite;
        }

        @keyframes shine {
            0% { left: -100%; }
            20% { left: 200%; }
            100% { left: 200%; }
        }

        .balance-card p {
            font-size: 0.95rem;
            color: var(--hint-color);
            margin-bottom: 10px;
        }

        .balance-card h2 {
            font-size: 2.4rem;
            font-weight: 800;
            text-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .currency-badge {
            font-size: 1.1rem;
            font-weight: 400;
            color: var(--hint-color);
        }

        /* دکمه‌های اصلی (خرید و فروش) */
        .action-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 35px;
        }

        .action-btn {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(10px);
            border-radius: 22px;
            padding: 22px 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 15px;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .action-btn:active {
            transform: scale(0.95);
            background: rgba(255, 255, 255, 0.05);
        }

        .icon-wrapper {
            width: 55px;
            height: 55px;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
        }

        .btn-buy .icon-wrapper {
            background: rgba(16, 185, 129, 0.15);
            color: var(--buy-color);
            box-shadow: 0 0 20px rgba(16, 185, 129, 0.2);
        }

        .btn-sell .icon-wrapper {
            background: rgba(239, 68, 68, 0.15);
            color: var(--sell-color);
            box-shadow: 0 0 20px rgba(239, 68, 68, 0.2);
        }

        .action-btn span {
            font-size: 1.05rem;
            font-weight: 700;
            color: var(--text-color);
        }

        /* منوهای پایین */
        .menu-list {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .menu-item {
            display: flex;
            align-items: center;
            padding: 22px 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
            cursor: pointer;
            transition: background 0.2s;
        }

        .menu-item:active {
            background: rgba(255, 255, 255, 0.05);
        }

        .menu-item:last-child {
            border-bottom: none;
        }

        .menu-icon {
            width: 42px;
            height: 42px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-left: 15px;
            color: white;
            font-size: 1.1rem;
        }

        /* گرادیان‌های جذاب برای آیکون‌های منو */
        .icon-wallet { background: linear-gradient(135deg, #6366f1, #4f46e5); box-shadow: 0 4px 10px rgba(99, 102, 241, 0.3); }
        .icon-rules { background: linear-gradient(135deg, #14b8a6, #0d9488); box-shadow: 0 4px 10px rgba(20, 184, 166, 0.3); }
        .icon-support { background: linear-gradient(135deg, #f59e0b, #d97706); box-shadow: 0 4px 10px rgba(245, 158, 11, 0.3); }

        .menu-text {
            flex-grow: 1;
            font-size: 1.05rem;
            font-weight: 500;
        }

        .menu-arrow {
            color: var(--hint-color);
            font-size: 0.9rem;
            opacity: 0.5;
        }
    </style>
</head>
<body>

    <!-- هاله‌های نوری پس‌زمینه -->
    <div class="glow-circle-1"></div>
    <div class="glow-circle-2"></div>

    <!-- هدر با نام صرافی و نشان کاربر -->
    <div class="header">
        <div class="brand-container">
            <span class="brand-en">Parabitex</span>
            <span class="brand-fa">پارابیتکس</span>
        </div>
        <div class="user-status">
            <i class="fa-solid fa-gem"></i>
            <span id="userName">کاربر</span>
        </div>
    </div>

    <!-- کارت موجودی با افکت نوری متحرک -->
    <div class="balance-card">
        <p>موجودی تقریبی شما</p>
        <h2>۰ <span class="currency-badge">تومان</span></h2>
    </div>

    <!-- دکمه‌های خرید و فروش -->
    <div class="action-grid">
        <div class="action-btn btn-buy" onclick="handleAction('buy')">
            <div class="icon-wrapper">
                <i class="fa-solid fa-arrow-down"></i>
            </div>
            <span>خرید رمز ارز</span>
        </div>
        
        <div class="action-btn btn-sell" onclick="handleAction('sell')">
            <div class="icon-wrapper">
                <i class="fa-solid fa-arrow-up"></i>
            </div>
            <span>فروش رمز ارز</span>
        </div>
    </div>

    <!-- منوی خدمات -->
    <div class="menu-list">
        <div class="menu-item" onclick="handleAction('wallet')">
            <div class="menu-icon icon-wallet"><i class="fa-solid fa-wallet"></i></div>
            <div class="menu-text">کیف پول من</div>
            <i class="fa-solid fa-chevron-left menu-arrow"></i>
        </div>
        
        <div class="menu-item" onclick="handleAction('rules')">
            <div class="menu-icon icon-rules"><i class="fa-solid fa-shield-halved"></i></div>
            <div class="menu-text">قوانین و امنیت</div>
            <i class="fa-solid fa-chevron-left menu-arrow"></i>
        </div>
        
        <div class="menu-item" onclick="handleAction('support')">
            <div class="menu-icon icon-support"><i class="fa-solid fa-headset"></i></div>
            <div class="menu-text">تماس با پشتیبانی</div>
            <i class="fa-solid fa-chevron-left menu-arrow"></i>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand(); 
        tg.ready();

        // ست کردن نام کاربر در نشان بالای صفحه
        const user = tg.initDataUnsafe?.user;
        if (user && user.first_name) {
            document.getElementById('userName').innerText = user.first_name;
        }

        // هندل کردن اکشن‌ها
        function handleAction(action) {
            tg.HapticFeedback.impactOccurred('medium'); 

            switch(action) {
                case 'buy':
                    tg.sendData(JSON.stringify({action: "open_buy"}));
                    break;
                case 'sell':
                    tg.sendData(JSON.stringify({action: "open_sell"}));
                    break;
                case 'wallet':
                    tg.sendData(JSON.stringify({action: "open_wallet"}));
                    break;
                case 'rules':
                    tg.showAlert("قوانین و حریم خصوصی به زودی اضافه می‌شود.");
                    break;
                case 'support':
                    tg.openTelegramLink("https://t.me/YourSupportUsername");
                    break;
            }
        }
    </script>
</body>
</html>
